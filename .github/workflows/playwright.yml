name: Playwright API Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    # - name: Wait for Backend to be ready
    #   run: npx wait-on http://localhost:8887/api/v1/employees

    - name: Start Backend (Docker)
      run: docker run -d --rm --name qa-practice-api -p 8887:8081 rvancea/qa-practice-api:latest

    - name: Wait for Backend and Run Tests
      run: |
          npx wait-on http://localhost:8887/api/v1/employees
          npx playwright test api-employee.spec.js

    # - name: Run Playwright tests
    #   run: npx playwright test api-employee.spec.js
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
